services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - sqlite_data:/var/www/html/database
      - storage_data:/var/www/html/storage
      - bootstrap_cache:/var/www/html/bootstrap/cache
    env_file:
      - .env
    restart: unless-stopped

volumes:
  sqlite_data:
  storage_data:
  bootstrap_cache:
